sigenergy_dark:
  # Teerathap sigenergy - Apple-Glass design language (deep slate, warm accent).
  # Tokens follow the iOS / Apple-Glass spec: one warm accent, system type,
  # frosted-glass surfaces, monochrome ramps reserved for data only.

  # ---- Base environment: deep slate ----
  ts-bg: '#0f1216'
  ts-bg-warm: '#141820'
  ts-bg-deep: '#0a0c10'
  ts-card: '#1b212b'
  ts-card-soft: '#222a36'
  ts-hairline: 'rgba(255,255,255,0.10)'
  ts-divider: 'rgba(255,255,255,0.07)'
  ts-ink: '#f4f6f8'
  ts-ink-soft: '#d3d8df'
  ts-ink-muted: '#9aa3ad'
  ts-ink-faint: '#6b7480'
  ts-ink-disabled: '#4a525c'

  # ---- One warm accent + semantic tokens ----
  ts-accent: '#f5a623'
  ts-accent-press: '#d98b0c'
  ts-accent-soft: 'rgba(245,166,35,0.16)'
  ts-good: '#1aae84'
  ts-good-bright: '#22d3a0'
  ts-info: '#0288c7'
  ts-warn: '#f5a623'
  ts-danger: '#c92e3c'

  # ---- Glass material tints (dark environment) ----
  ts-glass-thick: 'rgba(255,255,255,0.08)'
  ts-glass-regular: 'rgba(255,255,255,0.06)'
  ts-glass-thin: 'rgba(255,255,255,0.05)'
  ts-glass-hud: 'rgba(27,33,43,0.85)'
  ts-specular: 'rgba(255,255,255,0.12)'

  # ---- Type ----
  ts-font-sans: "-apple-system, BlinkMacSystemFont, 'SF Pro Display', Inter, 'Noto Sans Thai', sans-serif"
  ts-font-mono: "ui-monospace, 'SF Mono', 'Geist Mono', monospace"
  primary-font-family: "-apple-system, BlinkMacSystemFont, 'SF Pro Display', Inter, 'Noto Sans Thai', sans-serif"
  paper-font-common-base_-_font-family: "-apple-system, BlinkMacSystemFont, 'SF Pro Display', Inter, 'Noto Sans Thai', sans-serif"

  # ---- Home Assistant mapped variables ----
  accent-color: '#f5a623'
  app-header-background-color: 'rgba(15,18,22,0.72)'
  app-header-text-color: '#f4f6f8'
  card-background-color: '#1b212b'
  divider-color: 'rgba(255,255,255,0.07)'
  ha-card-background: 'rgba(255,255,255,0.06)'
  ha-card-border-color: 'rgba(255,255,255,0.10)'
  ha-card-border-radius: 16px
  ha-card-box-shadow: 'inset 0 1px 0 rgba(255,255,255,0.12), inset 0 -1px 0 rgba(0,0,0,0.20), 0 16px 32px rgba(0,0,0,0.28)'
  ha-card-header-color: '#f4f6f8'
  lovelace-background: '#0f1216'
  paper-card-background-color: '#1b212b'
  primary-background-color: '#0f1216'
  primary-color: '#f5a623'
  primary-text-color: '#f4f6f8'
  rgb-primary-color: 245,166,35
  rgb-accent-color: 245,166,35
  secondary-background-color: '#141820'
  secondary-text-color: '#9aa3ad'
  sidebar-background-color: 'rgba(15,18,22,0.80)'
  sidebar-icon-color: '#9aa3ad'
  sidebar-selected-icon-color: '#f5a623'
  sidebar-selected-text-color: '#f5a623'
  sidebar-text-color: '#f4f6f8'
  state-icon-active-color: '#f5a623'
  switch-checked-color: '#f5a623'
  mdc-theme-primary: '#f5a623'
  label-badge-background-color: '#1b212b'
  modes:
    light:
      accent-color: '#f5a623'
      app-header-background-color: 'rgba(15,18,22,0.72)'
      app-header-text-color: '#f4f6f8'
      card-background-color: '#1b212b'
      divider-color: 'rgba(255,255,255,0.07)'
      ha-card-background: 'rgba(255,255,255,0.06)'
      ha-card-border-color: 'rgba(255,255,255,0.10)'
      ha-card-border-radius: 16px
      ha-card-header-color: '#f4f6f8'
      lovelace-background: '#0f1216'
      paper-card-background-color: '#1b212b'
      primary-background-color: '#0f1216'
      primary-color: '#f5a623'
      primary-text-color: '#f4f6f8'
      rgb-primary-color: 245,166,35
      secondary-background-color: '#141820'
      secondary-text-color: '#9aa3ad'
      sidebar-background-color: 'rgba(15,18,22,0.80)'
      sidebar-icon-color: '#9aa3ad'
